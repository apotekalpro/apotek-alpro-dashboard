<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Performance · BPT</title>
<style>
:root {
  --bg:        #f5f6fa;
  --surface:   #ffffff;
  --border:    rgba(0,0,0,0.08);
  --border2:   rgba(0,0,0,0.14);
  --text:      #1a1a2e;
  --muted:     #6b6b8a;
  --faint:     #aaaabc;
  --ig1:       #E1306C;
  --ig2:       #833AB4;
  --ig3:       #F77737;
  --ig4:       #FCAF45;
  --ig5:       #405DE6;
  --teal:      #009faf;
  --cyan:      #00bcd4;
  --purple:    #7c3aed;
  --green:     #16a34a;
  --orange:    #ea580c;
  --gold:      #d97706;
  --silver:    #64748b;
  --card-shad: 0 2px 12px rgba(0,0,0,0.07);
  --card-shad-hover: 0 6px 20px rgba(0,0,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',system-ui,sans-serif;min-height:100vh;font-size:14px}

/* HEADER */
.hdr{background:linear-gradient(135deg,#833AB4 0%,#E1306C 45%,#F77737 100%);padding:13px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 3px 16px rgba(225,48,108,.35);position:sticky;top:0;z-index:100}
.hdr-logo{width:40px;height:40px;border-radius:11px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;flex-shrink:0;border:1px solid rgba(255,255,255,.25)}
.hdr-title h1{font-size:1.05rem;font-weight:800;color:#fff;line-height:1.2}
.hdr-title p{font-size:.7rem;color:rgba(255,255,255,.75)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn-refresh{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.30);border-radius:9px;padding:7px 14px;color:#fff;font-weight:700;font-size:.78rem;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .22s}
.btn-refresh:hover{background:rgba(255,255,255,.30);transform:translateY(-1px)}
.sync-ts{font-size:.67rem;color:rgba(255,255,255,.70)}

/* MONTH TABS */
.tabs{display:flex;gap:0;padding:0 20px;background:var(--surface);border-bottom:2px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:66px;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:12px 18px;border-bottom:3px solid transparent;background:transparent;color:var(--muted);font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .18s;margin-bottom:-2px;border:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--text);background:rgba(225,48,108,.04)}
.tab.active{color:var(--ig1);border-bottom-color:var(--ig1);background:rgba(225,48,108,.04)}

/* MAIN */
.main{padding:20px;max-width:1400px;margin:0 auto}
.sec{display:none}.sec.active{display:block}

/* SECTION TITLE */
.sec-title{display:flex;align-items:center;gap:10px;font-size:1rem;font-weight:800;color:var(--text);margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid var(--border);flex-wrap:wrap}
.pill{font-size:.67rem;font-weight:700;padding:3px 10px;border-radius:20px}
.pill.ig{background:linear-gradient(135deg,rgba(131,58,180,.12),rgba(225,48,108,.12));color:var(--ig1);border:1px solid rgba(225,48,108,.2)}
.pill.mo{background:rgba(0,188,212,.1);color:var(--teal);border:1px solid rgba(0,188,212,.2)}
.pill.future{background:rgba(100,116,139,.1);color:var(--silver);border:1px solid rgba(100,116,139,.2)}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:12px;margin-bottom:22px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px 14px;transition:all .22s;box-shadow:var(--card-shad);position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
.sc.c1::after{background:var(--ig1)}.sc.c2::after{background:var(--ig2)}.sc.c3::after{background:var(--ig3)}.sc.c4::after{background:var(--ig4)}.sc.c5::after{background:var(--ig5)}.sc.c6::after{background:var(--green)}.sc.c7::after{background:var(--teal)}.sc.c8::after{background:var(--orange)}.sc.c9::after{background:var(--purple)}
.sc:hover{transform:translateY(-2px);box-shadow:var(--card-shad-hover)}
.sc .lbl{font-size:.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.sc .val{font-size:1.5rem;font-weight:900;margin:5px 0 2px;line-height:1}
.sc .sub{font-size:.64rem;color:var(--faint)}
.sc.c1 .val{color:var(--ig1)}.sc.c2 .val{color:var(--ig2)}.sc.c3 .val{color:var(--ig3)}.sc.c4 .val{color:var(--ig4)}.sc.c5 .val{color:var(--ig5)}.sc.c6 .val{color:var(--green)}.sc.c7 .val{color:var(--teal)}.sc.c8 .val{color:var(--orange)}.sc.c9 .val{color:var(--purple)}
.sc-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:2rem;opacity:.06}

/* GOAL DISTRIBUTION */
.goal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:22px}
.gc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 12px;text-align:center;transition:all .22s;box-shadow:var(--card-shad);position:relative;overflow:hidden}
.gc:hover{transform:translateY(-2px);box-shadow:var(--card-shad-hover)}
.gc .g-icon{font-size:1.4rem;margin-bottom:6px}
.gc .g-name{font-size:.68rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.gc .g-count{font-size:1.5rem;font-weight:900;line-height:1;margin-bottom:2px}
.gc .g-pct{font-size:.65rem;color:var(--faint);font-weight:600}
.gc.gbranding{border-top:3px solid var(--ig1)}.gc.gbranding .g-count{color:var(--ig1)}
.gc.gseeding{border-top:3px solid var(--ig2)}.gc.gseeding .g-count{color:var(--ig2)}
.gc.gengagement{border-top:3px solid var(--ig3)}.gc.gengagement .g-count{color:var(--ig3)}
.gc.gawareness{border-top:3px solid var(--ig5)}.gc.gawareness .g-count{color:var(--ig5)}
.gc.gother{border-top:3px solid var(--silver)}.gc.gother .g-count{color:var(--silver)}

/* CARD / TABLE */
.card{background:var(--surface);border:1px solid var(--border);border-radius:13px;overflow:hidden;margin-bottom:24px;box-shadow:var(--card-shad)}
.card-hdr{padding:13px 18px;background:linear-gradient(135deg,rgba(225,48,108,.06),rgba(131,58,180,.04));border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.card-hdr h3{font-weight:700;font-size:.9rem;color:var(--text)}
.badge{margin-left:auto;font-size:.67rem;background:rgba(225,48,108,.08);color:var(--ig1);padding:3px 9px;border-radius:20px;font-weight:600;border:1px solid rgba(225,48,108,.15)}
.tscroll{overflow-x:auto}
table.t{width:100%;border-collapse:collapse}
table.t th{background:rgba(0,0,0,.025);padding:9px 14px;text-align:left;font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);white-space:nowrap;font-weight:700}
table.t td{padding:10px 14px;font-size:.81rem;border-bottom:1px solid rgba(0,0,0,.04);vertical-align:middle;color:var(--text)}
table.t tr:last-child td{border-bottom:none}
table.t tr:hover td{background:rgba(225,48,108,.025)}
.chip{display:inline-flex;align-items:center;gap:3px;font-size:.67rem;background:rgba(0,0,0,.04);border:1px solid var(--border);border-radius:5px;padding:2px 7px;white-space:nowrap;color:var(--muted)}
.chip.goal-branding{color:var(--ig1);background:rgba(225,48,108,.07);border-color:rgba(225,48,108,.2)}
.chip.goal-seeding{color:var(--ig2);background:rgba(131,58,180,.07);border-color:rgba(131,58,180,.2)}
.chip.goal-engagement{color:var(--ig3);background:rgba(247,119,55,.08);border-color:rgba(247,119,55,.2)}
.chip.goal-awareness{color:var(--ig5);background:rgba(64,93,230,.07);border-color:rgba(64,93,230,.2)}
.chip.day-c{color:var(--purple);background:rgba(124,58,237,.06);border-color:rgba(124,58,237,.15)}
.chip.date-c{color:var(--teal);background:rgba(0,188,212,.06);border-color:rgba(0,188,212,.15)}
.num-good{color:var(--green);font-weight:700}
.num-ok{color:var(--orange);font-weight:700}
.num-plain{color:var(--text);font-weight:600}
.er-bar-wrap{display:flex;align-items:center;gap:8px}
.er-bar{height:6px;border-radius:3px;background:linear-gradient(90deg,var(--ig1),var(--ig2));flex-shrink:0}
.er-val{font-size:.78rem;font-weight:700;color:var(--ig2);white-space:nowrap}

/* LEADERBOARD */
.lb-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:20px;margin-bottom:24px}
.lb-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.lb-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.lb-icon.lv{background:linear-gradient(135deg,#E1306C,#F77737)}
.lb-icon.ll{background:linear-gradient(135deg,#833AB4,#E1306C)}
.lb-icon.le{background:linear-gradient(135deg,#405DE6,#833AB4)}
.lb-hdr-text h3{font-size:.9rem;font-weight:800;color:var(--text)}
.lb-hdr-text p{font-size:.68rem;color:var(--muted);margin-top:1px}
.lb-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;overflow:hidden;box-shadow:var(--card-shad)}
.lb-row{display:flex;align-items:flex-start;gap:11px;padding:14px 15px;border-bottom:1px solid rgba(0,0,0,.05);transition:background .15s}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:rgba(225,48,108,.025)}
.rnk{width:32px;height:32px;min-width:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.84rem;flex-shrink:0;margin-top:2px}
.r1{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;box-shadow:0 3px 10px rgba(245,158,11,.35)}
.r2{background:linear-gradient(135deg,#94a3b8,#64748b);color:#fff}
.r3{background:linear-gradient(135deg,#cd7f32,#92400e);color:#fff}
.r4,.r5{background:rgba(0,0,0,.06);color:var(--muted)}
.lb-info{flex:1;min-width:0}
.lb-title{font-size:.86rem;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:5px;word-break:break-word}
.lb-details{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.lb-metric{text-align:right;flex-shrink:0;min-width:78px;padding-top:2px}
.lb-metric .mv{font-size:1.15rem;font-weight:900;line-height:1}
.lb-metric .ms{font-size:.63rem;color:var(--muted);margin-top:3px}
.lv-m .mv{color:var(--ig1)}
.ll-m .mv{color:var(--ig2)}
.le-m .mv{color:var(--ig5)}

/* LOADING */
#loadOverlay{position:fixed;inset:0;background:rgba(245,246,250,.95);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spinner{width:44px;height:44px;border-radius:50%;border:4px solid rgba(225,48,108,.15);border-top-color:var(--ig1);animation:spin .85s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.prog-wrap{width:220px;height:5px;background:rgba(0,0,0,.08);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--ig1),var(--ig2));border-radius:3px;transition:width .4s}
.load-txt{color:var(--text);font-size:.88rem;font-weight:600}
.load-sub{color:var(--muted);font-size:.72rem}
.nodata{text-align:center;padding:40px 20px;color:var(--faint);font-size:.83rem}
.nodata-icon{font-size:2rem;margin-bottom:10px}
.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px}
.coming-soon .cs-icon{font-size:3rem;opacity:.4}
.coming-soon h3{font-size:1.1rem;font-weight:700;color:var(--muted)}
.coming-soon p{font-size:.8rem;color:var(--faint);max-width:280px;text-align:center}

/* RESPONSIVE */
@media(max-width:640px){
  .main{padding:12px}
  .lb-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .goal-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:400px){
  .stat-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loadOverlay">
  <div class="spinner"></div>
  <p class="load-txt">Memuat data Instagram…</p>
  <div class="prog-wrap"><div class="prog-fill" id="ldProg"></div></div>
  <p class="load-sub" id="ldSub">Menghubungkan ke Google Sheets…</p>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-logo">📸</div>
  <div class="hdr-title">
    <h1>Instagram Performance</h1>
    <p>BPT · Content Analytics · Auto-synced from Google Sheets</p>
  </div>
  <div class="hdr-right">
    <button class="btn-refresh" onclick="doRefresh()">&#8635; Refresh</button>
    <span class="sync-ts" id="syncTs"></span>
  </div>
</div>

<!-- MONTH TABS -->
<div class="tabs" id="monthTabs">
  <!-- Injected by JS -->
</div>

<!-- MAIN CONTENT -->
<div class="main" id="mainContent">
  <!-- Injected by JS -->
</div>

<script>
// ============================================================
//  CONFIG
// ============================================================
const SHEET_ID = '16wYhLLLDNq6d8Tc9inWcz_0yig1XkV-AuHBxyd01AzM';
const MONTHS = [
  { key: 'feb2026',  label: 'Februari 2026', sheet: 'Februari 2026',  active: true },
  { key: 'mar2026',  label: 'Maret 2026',    sheet: 'Maret 2026',     active: true },
  { key: 'apr2026',  label: 'April 2026',    sheet: 'April 2026',     active: true },
  { key: 'mei2026',  label: 'Mei 2026',      sheet: 'Mei 2026',       active: false },
  { key: 'jun2026',  label: 'Juni 2026',     sheet: 'Juni 2026',      active: false },
];

const GOAL_CONFIG = {
  Branding:   { icon: '🏷️',  cls: 'gbranding'   },
  Seeding:    { icon: '🌱',  cls: 'gseeding'     },
  Engagement: { icon: '💬',  cls: 'gengagement'  },
  Awareness:  { icon: '📣',  cls: 'gawareness'   },
};

// Cached data
const cache = {};
let currentTab = 'feb2026';

// ============================================================
//  FETCH HELPERS
// ============================================================
function parseNum(v) {
  if (!v) return 0;
  v = v.toString().trim().replace(/,/g, '').replace(/%/g, '');
  return parseFloat(v) || 0;
}

function parsePct(v) {
  if (!v) return 0;
  v = v.toString().trim().replace(/%/g, '');
  return parseFloat(v) || 0;
}

function csvToRows(csv) {
  const rows = [];
  let inQ = false, cur = '', cells = [];
  for (let i = 0; i < csv.length; i++) {
    const c = csv[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { cells.push(cur); cur = ''; continue; }
    if (c === '\n' && !inQ) { cells.push(cur); rows.push(cells); cells = []; cur = ''; continue; }
    cur += c;
  }
  if (cur || cells.length) { cells.push(cur); rows.push(cells); }
  return rows;
}

async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.text();
}

function parsePostsFromCSV(csv, monthLabel) {
  const rows = csvToRows(csv);
  const posts = [];
  for (const row of rows) {
    if (row.length < 10) continue;
    const status = (row[9] || '').trim();
    if (status !== 'Publish') continue;
    posts.push({
      month:          monthLabel,
      day:            (row[1] || '').trim(),
      date:           (row[2] || '').trim(),
      content_theme:  (row[5] || '').trim(),
      goal:           (row[8] || '').trim(),
      view:           parseNum(row[11]),
      like:           parseNum(row[12]),
      repost:         parseNum(row[13]),
      comment:        parseNum(row[14]),
      share:          parseNum(row[15]),
      save:           parseNum(row[16]),
      engagement:     parseNum(row[17]),
      engagement_rate: parsePct(row[18]),
    });
  }
  return posts;
}

// ============================================================
//  FORMAT HELPERS
// ============================================================
function fmtNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000)    return (n/1000).toFixed(1) + 'K';
  return Math.round(n).toLocaleString('id-ID');
}

function fmtNumFull(n) {
  return Math.round(n).toLocaleString('id-ID');
}

function goalClass(g) {
  const m = { Branding: 'goal-branding', Seeding: 'goal-seeding', Engagement: 'goal-engagement', Awareness: 'goal-awareness' };
  return m[g] || '';
}

function rankClass(i) {
  return ['r1','r2','r3','r4','r5'][i] || 'r5';
}

// ============================================================
//  BUILD MONTH SECTION
// ============================================================
function buildMonthSection(posts, monthKey, monthLabel) {
  if (!posts || posts.length === 0) {
    return `<div class="coming-soon">
      <div class="cs-icon">📅</div>
      <h3>Belum ada data untuk ${monthLabel}</h3>
      <p>Data akan muncul otomatis setelah postingan di-publish dan diinput ke Google Sheets.</p>
    </div>`;
  }

  const total = posts.length;
  const totalView       = posts.reduce((a,p) => a + p.view, 0);
  const totalLike       = posts.reduce((a,p) => a + p.like, 0);
  const totalRepost     = posts.reduce((a,p) => a + p.repost, 0);
  const totalComment    = posts.reduce((a,p) => a + p.comment, 0);
  const totalShare      = posts.reduce((a,p) => a + p.share, 0);
  const totalSave       = posts.reduce((a,p) => a + p.save, 0);
  const totalEngagement = posts.reduce((a,p) => a + p.engagement, 0);
  const avgER = posts.filter(p => p.engagement_rate > 0).length > 0
    ? posts.reduce((a,p) => a + p.engagement_rate, 0) / posts.filter(p => p.engagement_rate > 0).length
    : 0;

  // Goal distribution
  const goalMap = {};
  for (const p of posts) {
    const g = p.goal || 'Lainnya';
    goalMap[g] = (goalMap[g] || 0) + 1;
  }
  const goalOrder = ['Branding','Seeding','Engagement','Awareness'];
  const sortedGoals = [...goalOrder.filter(g => goalMap[g]), ...Object.keys(goalMap).filter(g => !goalOrder.includes(g))];

  // Leaderboards
  const top5View = [...posts].sort((a,b) => b.view - a.view).slice(0,5);
  const top5Like = [...posts].sort((a,b) => b.like - a.like).slice(0,5);
  const top5ER   = [...posts].sort((a,b) => b.engagement_rate - a.engagement_rate).slice(0,5);

  // ── STAT CARDS ──────────────────────────────────────────
  const statsHTML = `
  <div class="stat-grid">
    <div class="sc c1"><span class="sc-icon">📝</span><div class="lbl">Total Post</div><div class="val">${total}</div><div class="sub">Status Publish</div></div>
    <div class="sc c2"><span class="sc-icon">👁️</span><div class="lbl">Total Views</div><div class="val">${fmtNum(totalView)}</div><div class="sub">${fmtNumFull(totalView)} views</div></div>
    <div class="sc c3"><span class="sc-icon">❤️</span><div class="lbl">Total Like</div><div class="val">${fmtNum(totalLike)}</div><div class="sub">${fmtNumFull(totalLike)} likes</div></div>
    <div class="sc c4"><span class="sc-icon">🔁</span><div class="lbl">Total Repost</div><div class="val">${fmtNum(totalRepost)}</div><div class="sub">${fmtNumFull(totalRepost)} repost</div></div>
    <div class="sc c5"><span class="sc-icon">💬</span><div class="lbl">Total Komentar</div><div class="val">${fmtNum(totalComment)}</div><div class="sub">${fmtNumFull(totalComment)} komentar</div></div>
    <div class="sc c6"><span class="sc-icon">↗️</span><div class="lbl">Total Share</div><div class="val">${fmtNum(totalShare)}</div><div class="sub">${fmtNumFull(totalShare)} share</div></div>
    <div class="sc c7"><span class="sc-icon">🔖</span><div class="lbl">Total Save</div><div class="val">${fmtNum(totalSave)}</div><div class="sub">${fmtNumFull(totalSave)} save</div></div>
    <div class="sc c8"><span class="sc-icon">📊</span><div class="lbl">Total Engagement</div><div class="val">${fmtNum(totalEngagement)}</div><div class="sub">${fmtNumFull(totalEngagement)} total</div></div>
    <div class="sc c9"><span class="sc-icon">📈</span><div class="lbl">Avg Eng. Rate</div><div class="val">${avgER.toFixed(2)}%</div><div class="sub">Rata-rata per post</div></div>
  </div>`;

  // ── GOAL DISTRIBUTION ────────────────────────────────────
  const goalHTML = `
  <div class="sec-title">🎯 Distribusi Goal Konten</div>
  <div class="goal-grid">
    ${sortedGoals.map(g => {
      const cfg = GOAL_CONFIG[g] || { icon: '📌', cls: 'gother' };
      const cnt = goalMap[g];
      const pct = ((cnt / total) * 100).toFixed(1);
      return `<div class="gc ${cfg.cls}">
        <div class="g-icon">${cfg.icon}</div>
        <div class="g-name">${g}</div>
        <div class="g-count">${cnt}</div>
        <div class="g-pct">${pct}% dari total</div>
      </div>`;
    }).join('')}
  </div>`;

  // ── LEADERBOARD ROW ──────────────────────────────────────
  function lbRow(p, i, metricVal, metricLbl, metricClass) {
    return `<div class="lb-row">
      <div class="rnk ${rankClass(i)}">${i+1}</div>
      <div class="lb-info">
        <div class="lb-title">${p.content_theme || '(no theme)'}</div>
        <div class="lb-details">
          <span class="chip day-c">📅 ${p.day}</span>
          <span class="chip date-c">🗓 ${p.date}</span>
          <span class="chip ${goalClass(p.goal)}">${p.goal || '-'}</span>
        </div>
      </div>
      <div class="lb-metric ${metricClass}">
        <div class="mv">${metricVal}</div>
        <div class="ms">${metricLbl}</div>
      </div>
    </div>`;
  }

  const lbHTML = `
  <div class="sec-title">🏆 Leaderboard — Top 5 Posts</div>
  <div class="lb-grid">

    <div>
      <div class="lb-hdr">
        <div class="lb-icon lv">👁️</div>
        <div class="lb-hdr-text"><h3>Top 5 Views</h3><p>Post dengan tayangan terbanyak</p></div>
      </div>
      <div class="lb-card">
        ${top5View.map((p,i) => lbRow(p, i, fmtNumFull(p.view), 'views', 'lv-m')).join('')}
      </div>
    </div>

    <div>
      <div class="lb-hdr">
        <div class="lb-icon ll">❤️</div>
        <div class="lb-hdr-text"><h3>Top 5 Likes</h3><p>Post dengan likes terbanyak</p></div>
      </div>
      <div class="lb-card">
        ${top5Like.map((p,i) => lbRow(p, i, fmtNumFull(p.like), 'likes', 'll-m')).join('')}
      </div>
    </div>

    <div>
      <div class="lb-hdr">
        <div class="lb-icon le">📈</div>
        <div class="lb-hdr-text"><h3>Top 5 Engagement Rate</h3><p>Post dengan ER tertinggi</p></div>
      </div>
      <div class="lb-card">
        ${top5ER.map((p,i) => lbRow(p, i, p.engagement_rate.toFixed(2) + '%', 'eng. rate', 'le-m')).join('')}
      </div>
    </div>

  </div>`;

  // ── POST TABLE ────────────────────────────────────────────
  const tableHTML = `
  <div class="sec-title">📋 Semua Post Publish — ${monthLabel}</div>
  <div class="card">
    <div class="card-hdr">
      <h3>📋 Detail Semua Post</h3>
      <span class="badge">${total} post</span>
    </div>
    <div class="tscroll">
      <table class="t">
        <thead>
          <tr>
            <th>#</th>
            <th>Hari</th>
            <th>Tanggal</th>
            <th>Content Theme</th>
            <th>Goal</th>
            <th>Views</th>
            <th>Like</th>
            <th>Repost</th>
            <th>Komentar</th>
            <th>Share</th>
            <th>Save</th>
            <th>Engagement</th>
            <th>Eng. Rate</th>
          </tr>
        </thead>
        <tbody>
          ${posts.map((p,i) => {
            const erWidth = Math.min(p.engagement_rate * 6, 90);
            return `<tr>
              <td>${i+1}</td>
              <td><span class="chip day-c">${p.day}</span></td>
              <td><span class="chip date-c" style="white-space:nowrap">${p.date}</span></td>
              <td style="max-width:220px;font-size:.79rem">${p.content_theme || '-'}</td>
              <td><span class="chip ${goalClass(p.goal)}">${p.goal || '-'}</span></td>
              <td class="num-plain">${fmtNumFull(p.view)}</td>
              <td class="num-plain">${fmtNumFull(p.like)}</td>
              <td class="num-plain">${fmtNumFull(p.repost)}</td>
              <td class="num-plain">${fmtNumFull(p.comment)}</td>
              <td class="num-plain">${fmtNumFull(p.share)}</td>
              <td class="num-plain">${fmtNumFull(p.save)}</td>
              <td class="num-plain">${fmtNumFull(p.engagement)}</td>
              <td>
                <div class="er-bar-wrap">
                  <div class="er-bar" style="width:${erWidth}px"></div>
                  <span class="er-val">${p.engagement_rate.toFixed(2)}%</span>
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;

  return statsHTML + goalHTML + lbHTML + tableHTML;
}

// ============================================================
//  RENDER
// ============================================================
function buildTabs() {
  const container = document.getElementById('monthTabs');
  container.innerHTML = MONTHS.map(m =>
    `<button class="tab${m.key === currentTab ? ' active' : ''}" onclick="switchTab('${m.key}')">${m.label}</button>`
  ).join('');
}

function buildSections() {
  const container = document.getElementById('mainContent');
  container.innerHTML = MONTHS.map(m =>
    `<div class="sec${m.key === currentTab ? ' active' : ''}" id="sec-${m.key}">
      <div class="sec-title">
        📸 ${m.label}
        <span class="pill ig">Instagram</span>
        ${m.active ? `<span class="pill mo">Live Data</span>` : `<span class="pill future">Belum Tersedia</span>`}
      </div>
      <div id="content-${m.key}">
        <div class="coming-soon"><div class="cs-icon">⏳</div><h3>Memuat…</h3></div>
      </div>
    </div>`
  ).join('');
}

async function switchTab(key) {
  currentTab = key;
  // Update tabs
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.textContent === MONTHS.find(m => m.key === key)?.label);
  });
  // Update sections
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
  const sec = document.getElementById(`sec-${key}`);
  if (sec) sec.classList.add('active');
  // Load if not cached
  await loadMonthData(key);
}

async function loadMonthData(key) {
  const month = MONTHS.find(m => m.key === key);
  if (!month) return;
  const contentEl = document.getElementById(`content-${key}`);
  if (!contentEl) return;

  // Already loaded
  if (cache[key]) {
    contentEl.innerHTML = buildMonthSection(cache[key], key, month.label);
    return;
  }

  if (!month.active) {
    contentEl.innerHTML = `<div class="coming-soon">
      <div class="cs-icon">📅</div>
      <h3>Belum ada data untuk ${month.label}</h3>
      <p>Data akan muncul otomatis setelah postingan di-publish dan diinput ke Google Sheets.</p>
    </div>`;
    cache[key] = [];
    return;
  }

  // Show loading
  contentEl.innerHTML = `<div class="coming-soon"><div class="cs-icon">⏳</div><h3>Memuat ${month.label}…</h3></div>`;

  try {
    const csv = await fetchSheet(month.sheet);
    const posts = parsePostsFromCSV(csv, month.label);
    cache[key] = posts;
    contentEl.innerHTML = buildMonthSection(posts, key, month.label);
  } catch (e) {
    contentEl.innerHTML = `<div class="coming-soon">
      <div class="cs-icon">⚠️</div>
      <h3>Gagal memuat data</h3>
      <p>${e.message}</p>
    </div>`;
  }
}

async function doRefresh() {
  // Clear cache for current tab and reload
  delete cache[currentTab];
  await loadMonthData(currentTab);
  document.getElementById('syncTs').textContent = 'Diperbarui: ' + new Date().toLocaleTimeString('id-ID');
}

// ============================================================
//  INIT
// ============================================================
async function init() {
  const prog = document.getElementById('ldProg');
  const sub  = document.getElementById('ldSub');

  buildTabs();
  buildSections();

  // Load all active months
  const activeMonths = MONTHS.filter(m => m.active);
  for (let i = 0; i < activeMonths.length; i++) {
    const m = activeMonths[i];
    sub.textContent = `Memuat ${m.label}…`;
    prog.style.width = Math.round(((i + 0.5) / activeMonths.length) * 100) + '%';
    try {
      const csv = await fetchSheet(m.sheet);
      cache[m.key] = parsePostsFromCSV(csv, m.label);
    } catch(e) {
      cache[m.key] = [];
    }
    prog.style.width = Math.round(((i + 1) / activeMonths.length) * 100) + '%';
  }

  // Render current tab
  const cur = MONTHS.find(m => m.key === currentTab);
  if (cur) {
    document.getElementById(`content-${currentTab}`).innerHTML =
      buildMonthSection(cache[currentTab] || [], currentTab, cur.label);
  }

  document.getElementById('syncTs').textContent =
    'Diperbarui: ' + new Date().toLocaleTimeString('id-ID');

  // Hide overlay
  document.getElementById('loadOverlay').style.display = 'none';
}

init();
</script>
