<!DOCTYPE html>
<html>
<head>
    <title>OpEX API Test - Live Data</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .result { background: white; padding: 20px; margin: 10px 0; border-radius: 8px; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f0f0f0; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>OpEX Dashboard - API Connection Test</h1>
    <div id="results"></div>
    
    <script src="opex-config.js"></script>
    <script>
        const results = document.getElementById('results');
        
        async function testAPI() {
            results.innerHTML = '<div class="result">Testing API connection...</div>';
            
            const sheets = [
                { name: 'Audit', range: 'A1:N10' },
                { name: 'STTK_SHRINKAGE', range: 'A1:I10' },
                { name: 'Shrinkage_Items_Raw', range: 'A1:G10' },
                { name: 'CCTV_14H', range: 'A1:Q10' }
            ];
            
            for (const sheet of sheets) {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${OPEX_CONFIG.SHEET_ID}/values/${sheet.name}!${sheet.range}?key=${OPEX_CONFIG.API_KEY}`;
                
                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    if (response.ok) {
                        const rowCount = data.values ? data.values.length : 0;
                        results.innerHTML += `
                            <div class="result">
                                <h3 class="success">✓ ${sheet.name}</h3>
                                <p>Status: ${response.status} OK</p>
                                <p>Rows returned: ${rowCount}</p>
                                <details>
                                    <summary>First row data</summary>
                                    <pre>${JSON.stringify(data.values ? data.values[0] : [], null, 2)}</pre>
                                </details>
                            </div>
                        `;
                    } else {
                        results.innerHTML += `
                            <div class="result">
                                <h3 class="error">✗ ${sheet.name}</h3>
                                <p>Status: ${response.status}</p>
                                <pre>${JSON.stringify(data, null, 2)}</pre>
                            </div>
                        `;
                    }
                } catch (error) {
                    results.innerHTML += `
                        <div class="result">
                            <h3 class="error">✗ ${sheet.name}</h3>
                            <p>Error: ${error.message}</p>
                        </div>
                    `;
                }
            }
            
            results.innerHTML += '<div class="result"><h3>Test Complete</h3></div>';
        }
        
        testAPI();
    </script>
</body>
</html>
